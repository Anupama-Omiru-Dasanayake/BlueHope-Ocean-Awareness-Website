<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Screen</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <style>
        *,*::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root{
            --backgroundColor: #010810;
            --cyan: #00e5ff;
        }

        body{
            background: var(--backgroundColor);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: 'Cormorant Garamond', serif;
            /* cursor: none; */
            position: relative;
        }

        .ocean-color{
            position: relative;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 0%, #0a3d5e 0%, #041528 45%, var(--backgroundColor) 100%);
        }

        .rays {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .ray{
            position: absolute;
            top: -20%;
            width: 2px;
            height: 140%;
            background: linear-gradient(to bottom, #D4D4D9, transparent);
            /* border-radius: 50%; */
            transform-origin: top center;
            animation: ray-transform var(--duration) ease-in-out infinite alternate; 
            filter: blur(5px);     
        }

        .ray:nth-child(1)  { left: 8%;  --duration: 6s;  width: 60px;  opacity: 0.3; transform: rotate(-8deg); animation-delay: 0s; }
        .ray:nth-child(2)  { left: 18%; --duration: 8s;  width: 30px;  opacity: 0.2; transform: rotate(-3deg); animation-delay: -2s; }
        .ray:nth-child(3)  { left: 30%; --duration: 7s;  width: 40px;  opacity: 0.25; transform: rotate(5deg); animation-delay: -1s; }
        .ray:nth-child(4)  { left: 45%; --duration: 9s;  width: 50px;  opacity: 0.3; transform: rotate(-6deg); animation-delay: -3s; }
        .ray:nth-child(5)  { left: 58%; --duration: 6.5s; width: 40px; opacity: 0.2; transform: rotate(4deg); animation-delay: -0.5s; }
        .ray:nth-child(6)  { left: 70%; --duration: 7.5s; width: 70px; opacity: 0.25; transform: rotate(-2deg); animation-delay: -4s; }
        .ray:nth-child(7)  { left: 85%; --duration: 8.5s; width: 35px; opacity: 0.2; transform: rotate(7deg); animation-delay: -2.5s; }

        @keyframes ray-transform {
            0%   { transform: rotate(var(--r, -5deg)) scaleX(1); }
            100% { transform: rotate(calc(var(--r, -5deg) + 10deg)) scaleX(1.3); }
        }

        .bubble{
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6), rgba(0,180,216,0.1));
            border: 1px solid rgba(0, 210, 255, 0.4);
            animation: bubble-up var(--time) ease-in infinite;
            bottom: -50px;
            z-index: 3;
        }

        @keyframes bubble-up{
            0%   { transform: translateX(0) translateY(0) scale(1); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.7; }
            100% { transform: translateX(var(--x)) translateY(-110vh) scale(var(--scale)); opacity: 0; }
        }

        .bubble:nth-child(1)  { left:5%;   width:8px;  height:8px;  --time:8s;  --x:20px;  --scale:1.1; animation-delay:0s; }
        .bubble:nth-child(2)  { left:12%;  width:4px;  height:4px;  --time:10s; --x:-15px; --scale:0.9; animation-delay:-3s; }
        .bubble:nth-child(3)  { left:22%;  width:12px; height:12px; --time:7s;  --x:30px;  --scale:1.2; animation-delay:-1s; }
        .bubble:nth-child(4)  { left:33%;  width:6px;  height:6px;  --time:9s;  --x:-25px; --scale:1;   animation-delay:-5s; }
        .bubble:nth-child(5)  { left:45%;  width:10px; height:10px; --time:11s; --x:10px;  --scale:1.1; animation-delay:-2s; }
        .bubble:nth-child(6)  { left:55%;  width:5px;  height:5px;  --time:8.5s;--x:-20px; --scale:0.8; animation-delay:-7s; }
        .bubble:nth-child(7)  { left:67%;  width:14px; height:14px; --time:10s; --x:35px;  --scale:1.3; animation-delay:-4s; }
        .bubble:nth-child(8)  { left:76%;  width:7px;  height:7px;  --time:7.5s;--x:-10px; --scale:1;   animation-delay:-6s; }
        .bubble:nth-child(9)  { left:88%;  width:9px;  height:9px;  --time:9.5s;--x:15px;  --scale:1.15;animation-delay:-1.5s; }
        .bubble:nth-child(10) { left:15%;  width:3px;  height:3px;  --time:12s; --x:-5px;  --scale:0.7; animation-delay:-8s; }
        .bubble:nth-child(11) { left:38%;  width:11px; height:11px; --time:8s;  --x:40px;  --scale:1.2; animation-delay:-3.5s; }
        .bubble:nth-child(12) { left:62%;  width:6px;  height:6px;  --time:10.5s; --x:-30px; --scale:0.95;animation-delay:-9s; }
        .bubble:nth-child(13) { left:80%;  width:8px;  height:8px;  --time:7s;  --x:20px;  --scale:1.05;animation-delay:-2.5s; }
        .bubble:nth-child(14) { left:92%;  width:5px;  height:5px;  --time:11s; --x:-8px;  --scale:0.85;animation-delay:-6.5s; }
        .bubble:nth-child(15) { left:50%;  width:16px; height:16px; --time:9s;  --x:25px;  --scale:1.25;animation-delay:-4.5s; }


        .fish{
            position: absolute;
            animation: swim var(--fish-time) linear infinite;
            opacity: 0.85;
            filter: drop-shadow(0 0 6px var(--cyan));
            --fish-y: 0px;
        }

        @keyframes swim {
            0%   { transform: translateX(-200px) translateY(var(--fish-y)) scaleX(-1); }
            49%  { transform: translateX(110vw)  translateY(var(--fish-y)) scaleX(-1); }
            50%  { transform: translateX(110vw)  translateY(var(--fish-y)) scaleX(1); }
            100% { transform: translateX(-200px) translateY(var(--fish-y)) scaleX(1); }
        }

        #content-area{
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 2rem;
        }

        .logo-design{
            display: flex;
            justify-content: center;   /* ⬅ center items inside */
            align-items: center;
            gap: 15px;                 /* ⬅ cleaner spacing than padding */
            
            /* Remove the fixed width or change to auto */
            width: auto;               /* ⬅ was 225px, which was off-center */
            
            opacity: 0;                /* ⬅ add this so the animation starts correctly */
            transform: translateY(60px);
            animation: slideUp 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }
    
        .logo-design p{
            font-size: 80px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 500;
            color: white;
            text-align: center;
        }
        .logo-design img{
            width: 80px;
            height: 80px;
            border-radius: 0%;
        }
        .logo-design .h2o{
            color: rgb(38, 152, 204);
            font-family: 'Playfair Display', serif;
            font-weight: 500;
        }
        .logo-design sub{
            color: rgb(38, 152, 204);
            font-family: 'Playfair Display', serif;
            font-weight: 500;
            font-size: 50px;
        }

        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--cyan));
            margin: 1rem auto;
            opacity: 0;
            animation: fadeUp 1s ease forwards 0.5s;
        }

        .statement {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: rgba(178,235,242,0.7);
            letter-spacing: 0.1em;
            max-width: 520px;
            opacity: 0;
            animation: fadeUp 1s ease forwards 1s;
            line-height: 1.7;
            z-index: 10;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .team-members {
            font-size: 1.1rem;
            margin-bottom: 40px;
            color: rgba(178,235,242,0.7);
            opacity: 0;
            padding-top: 10px;
            animation: fadeUp 1s ease forwards 1.5s;
        }

        .circle{
            position: absolute;
            top: 78%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: #ccc;
            box-shadow: 0 0 0 5px #4973ff;
            border-radius: 50%;
            overflow: hidden;
        }

        .wave{
            position: relative;
            width: 100%;
            height: 100%;
            background: #4973ff;
            border-radius: 50%;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .wave::before,
        .wave::after{
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: 0;
            left: 50%;
            transform: translate(-50%, -75%);
            background: #000;
        }

        .wave::before{
            border-radius: 45%;
            background: radial-gradient(ellipse at 50% 0%, #0a3d5e 0%, #041528 45%, var(--backgroundColor) 100%);
            animation: animate 5s linear infinite;
        }

        .wave::after{
            border-radius: 40%;
            background: radial-gradient(ellipse at 50% 0%, #0a3d5e 0%, #041528 45%, var(--backgroundColor) 100%);
            animation: animate 5s linear infinite;
        }

        @keyframes animate{
            0%{
                transform: translate(-50%, -75%) rotate(0deg);
            }
            100%{
                transform: translate(-50%, -75%) rotate(360deg);
            }
        }

        .countdown-text {
            position: absolute;
            top: 85%;
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: bold;
            color: white;
        }

        .skip-btn {
            position: absolute;
            top: 90%;
            background-color: transparent;
            color: white;
            border: 2px solid white;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }

        .skip-btn:hover {
            color: rgba(178,235,242,0.7);
            border: 2px solid rgba(178,235,242,0.7);
        }

        .coral1 {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100px;
            height: 100px;
            z-index: 2;
            filter: drop-shadow(0 0 2px orange);
        }

        .coral2 {
            position: fixed;
            bottom: 0;
            left: 80px;
            width: 100px;
            height: 100px;
            z-index: 2;
            filter: drop-shadow(0 0 2px green);
        }

        .coral3 {
            position: fixed;
            bottom: 0;
            left: 60px;
            width: 150px;
            height: 150px;
            z-index: 1;
            filter: drop-shadow(0 0 2px blue);
        }

        .coral4 {
            position: fixed;
            bottom: 0;
            right: 0px;
            width: 200px;
            height: 200px;
            z-index: 1;
            filter: drop-shadow(0 0 2px #C72E10);
        }

        .coral5 {
            position: fixed;
            bottom: 0;
            left: 1100px;
            width: 150px;
            height: 150px;
            z-index: 1;
            filter: drop-shadow(0 0 2px #24ED96);
        }
        
    </style>
</head>
